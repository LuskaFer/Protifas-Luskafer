# lefthook.yml
yaml-language-server: $schema=https://json.schemastore.org/lefthook.json

pre-commit:
  parallel: true # Executa em paralelo para mais velocidade
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,jsonc,css,html}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    
    biome-lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: npx @biomejs/biome lint --no-errors-on-unmatched {staged_files}

commit-msg:
  commands:
    commitlint:
      # A MUDANÇA ESTÁ AQUI: {1} em vez de ${1}
      run: npx --no -- commitlint --edit {1}

pre-push:
  commands:
    type-check:
      run: npm run type-check
    
    biome-full-check:
      glob: "*.{js,ts,jsx,tsx,json,jsonc}"
      run: npx @biomejs/biome check --no-errors-on-unmatched {push_files}
